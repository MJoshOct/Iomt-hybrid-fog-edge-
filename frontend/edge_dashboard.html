<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Edge Gateway Monitor</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
max-width:800px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th, td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

th{
background:#34495e;
color:white;
}

tr:hover{
background:#f5f5f5;
}

</style>

</head>

<body>

<div class="container">

<h1>Edge Gateway Live Monitor</h1>

<table>

<thead>
<tr>
<th>Patient</th>
<th>Heart Rate (BPM)</th>
<th>SpO₂ (%)</th>
<th>Timestamp</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<script>

async function loadData(){

try{

const response = await fetch("http://127.0.0.1:5001/readings");
const data = await response.json();

const table = document.getElementById("tableBody");
table.innerHTML = "";

data.slice(0,20).forEach(r => {

const row = document.createElement("tr");

row.innerHTML = `
<td>${r.patient_id}</td>
<td>${r.heart_rate}</td>
<td>${r.spo2}</td>
<td>${r.timestamp}</td>
`;

table.appendChild(row);

});

}catch(e){
console.error("Error loading edge data:",e);
}

}

loadData();
setInterval(loadData,2000);

</script>

</body>
</html>
